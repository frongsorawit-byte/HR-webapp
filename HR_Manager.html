                                                        <button onClick={() => deleteHoliday(h.date)} className="p-1.5 rounded-lg text-latte hover:text-rust hover:bg-coffee2"><Trash2Icon className="w-4 h-4"/></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // --- Attendance View ---
        const AttendanceView = ({ scriptUrl, token, leaveData }) => {
            const now = new Date();
            const defaultMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
            const [month, setMonth] = useState(defaultMonth);
            const [attData, setAttData] = useState([]);
            const [loading, setLoading] = useState(false);
            const [filterEmp, setFilterEmp] = useState('');

            const loadAtt = useCallback(async () => {
                setLoading(true);
                try {
                    const d = await postAction(scriptUrl, token, 'list_attendance', { month });
                    setAttData(d.records || []);
                } catch {} finally { setLoading(false); }
            }, [scriptUrl, token, month]);

            useEffect(() => { loadAtt(); }, [loadAtt]);

            // Cross-check: วันที่+ชื่อที่มีใบลา
            const leaveSet = useMemo(() => {
                const s = new Set();
                const yr = parseInt(month.split('-')[0]);
                leaveData.forEach(r => {
                    const d = parseLeaveDate(r.leaveDate, yr);
                    if (d) {
                        const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                        s.add(`${ds}|${r.name}`);
                    }
                });
                return s;
            }, [leaveData, month]);

            const filtered = useMemo(() => {
                let rows = attData;
                if (filterEmp) rows = rows.filter(r => r.employee.includes(filterEmp));
                return [...rows].sort((a, b) => b.date.localeCompare(a.date));
            }, [attData, filterEmp]);

            const summary = useMemo(() => ({
                ma:   attData.filter(r => r.status === 'มา').length,
                sai:  attData.filter(r => r.status === 'สาย').length,
                khad: attData.filter(r => r.status === 'ขาด').length,
                ot:   attData.reduce((s, r) => s + (r.otHours || 0), 0),
            }), [attData]);

            const statusCls = (s) => {
                if (s === 'มา')  return 'bg-olive/15 text-olive border border-olive/30';
                if (s === 'สาย') return 'bg-caramel/15 text-caramel border border-caramel/30';
                if (s === 'ขาด') return 'bg-rust/15 text-rust border border-rust/30';
                return 'bg-coffee2 text-latte border border-bean';
            };

            const deleteRow = async (date, employee) => {
                if (!window.confirm(`ลบบันทึก ${employee} วันที่ ${date}?`)) return;
                try { await postAction(scriptUrl, token, 'delete_attendance', { date, employee }); loadAtt(); }
                catch (e) { alert('ผิดพลาด: ' + e.message); }
            };

            return (
                <div className="space-y-4">
                    {/* Controls */}
                    <div className="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
                        <h2 className="text-lg font-bold text-cream flex items-center gap-2">
                            <ClockIcon className="w-5 h-5 text-ochre"/> บันทึกเข้างาน
                            <span className="text-xs font-medium text-latte bg-coffee2 px-2 py-0.5 rounded-full">{attData.length} รายการ</span>
                        </h2>
                        <div className="flex gap-2 flex-wrap">
                            <input type="month" value={month} onChange={e => setMonth(e.target.value)} className={inputCls + " w-40"}/>
                            <div className="relative">
                                <SearchIcon className="w-4 h-4 text-latte absolute left-2.5 top-1/2 -translate-y-1/2"/>
                                <input value={filterEmp} onChange={e => setFilterEmp(e.target.value)} placeholder="ค้นหาพนักงาน..." className={inputCls + " pl-8 w-40"}/>
                            </div>
                            <button onClick={loadAtt} disabled={loading} className="p-2 rounded-lg bg-coffee2 text-latte hover:text-cream disabled:opacity-50" title="รีเฟรช">
                                <RefreshCwIcon className={`w-4 h-4 ${loading ? 'animate-spin' : ''}`}/>
                            </button>
                        </div>
                    </div>

                    {/* Summary cards */}
                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                        <div className="bg-coffee border border-bean rounded-xl p-4 text-center">
                            <div className="text-2xl font-bold text-olive">{summary.ma}</div>
                            <div className="text-xs text-latte mt-1">มาตรงเวลา</div>
                        </div>
                        <div className="bg-coffee border border-bean rounded-xl p-4 text-center">
                            <div className="text-2xl font-bold text-caramel">{summary.sai}</div>
                            <div className="text-xs text-latte mt-1">มาสาย</div>
                        </div>
                        <div className="bg-coffee border border-bean rounded-xl p-4 text-center">
                            <div className="text-2xl font-bold text-rust">{summary.khad}</div>
                            <div className="text-xs text-latte mt-1">ขาด</div>
                        </div>
                        <div className="bg-coffee border border-bean rounded-xl p-4 text-center">
                            <div className="text-2xl font-bold text-ochre">{summary.ot.toFixed(1)}</div>
                            <div className="text-xs text-latte mt-1">ชม. OT รวม</div>
                        </div>
                    </div>

                    {/* Empty state */}
                    {attData.length === 0 && !loading && (
                        <div className="bg-coffee border border-bean rounded-xl p-10 text-center text-latte text-sm space-y-2">
                            <ClockIcon className="w-12 h-12 mx-auto mb-3 opacity-20"/>
                            <p className="font-medium">ยังไม่มีบันทึกเข้างานในเดือนนี้</p>
                            <p className="text-xs text-latte/60">รัน <span className="font-mono bg-coffee2 px-1.5 py-0.5 rounded text-cream">hr_attendance_sync.py</span> เพื่อดึงข้อมูลจากเครื่องสแกนนิ้ว FS18MB</p>
                        </div>
                    )}

                    {/* Table */}
                    {(attData.length > 0 || loading) && (
                        <div className="bg-coffee border border-bean rounded-xl overflow-hidden">
                            {loading ? (
                                <div className="p-8 text-center text-latte text-sm">กำลังโหลด...</div>
                            ) : (
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse min-w-[720px]">
                                        <thead className="bg-coffee2/50">
                                            <tr>
                                                <th className="p-3 text-xs font-semibold text-latte uppercase">วันที่</th>
                                                <th className="p-3 text-xs font-semibold text-latte uppercase">พนักงาน</th>
                                                <th className="p-3 text-xs font-semibold text-latte uppercase text-center">เข้างาน</th>
                                                <th className="p-3 text-xs font-semibold text-latte uppercase text-center">เลิกงาน</th>
                                                <th className="p-3 text-xs font-semibold text-latte uppercase text-center">สาย (นาที)</th>
                                                <th className="p-3 text-xs font-semibold text-latte uppercase text-center">OT (ชม.)</th>
                                                <th className="p-3 text-xs font-semibold text-latte uppercase text-center">สถานะ</th>
                                                <th className="p-3 text-xs font-semibold text-latte uppercase">หมายเหตุ</th>
                                                <th className="p-3"></th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-bean">
                                            {filtered.map((r, i) => {
                                                const hasLeave = leaveSet.has(`${r.date}|${r.employee}`);
                                                return (
                                                    <tr key={`${r.date}-${r.employee}-${i}`} className="hover:bg-coffee2/40 transition-colors">
                                                        <td className="p-3 text-sm text-cream font-mono">{r.date}</td>
                                                        <td className="p-3 text-sm text-cream font-medium">
                                                            <div>{r.employee}</div>
                                                            {hasLeave && <span className="text-[10px] bg-caramel/15 text-caramel px-1.5 py-0.5 rounded">มีใบลา</span>}
                                                        </td>
                                                        <td className="p-3 text-sm text-latte font-mono text-center">{r.checkIn || '-'}</td>
                                                        <td className="p-3 text-sm text-latte font-mono text-center">{r.checkOut || '-'}</td>
                                                        <td className="p-3 text-sm text-center">
                                                            {r.lateMin > 0 ? <span className="text-caramel font-mono font-bold">{r.lateMin}</span> : <span className="text-latte/40">-</span>}
                                                        </td>
                                                        <td className="p-3 text-sm text-center">
                                                            {r.otHours > 0 ? <span className="text-ochre font-mono font-bold">{r.otHours.toFixed(1)}</span> : <span className="text-latte/40">-</span>}
                                                        </td>
                                                        <td className="p-3 text-center">
                                                            <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${statusCls(r.status)}`}>{r.status || '-'}</span>
                                                        </td>
                                                        <td className="p-3 text-sm text-latte">{r.note || '-'}</td>
                                                        <td className="p-3 text-right">
                                                            <button onClick={() => deleteRow(r.date, r.employee)} className="p-1.5 rounded-lg text-latte hover:text-rust hover:bg-coffee2"><Trash2Icon className="w-4 h-4"/></button>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // --- OT View ---
        const OTView = ({ scriptUrl, token, employees }) => {
            const now = new Date();
            const defaultMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
            const [month, setMonth] = useState(defaultMonth);
            const [attData, setAttData] = useState([]);
            const [settings, setSettings] = useState({});
            const [holidays, setHolidays] = useState([]);
            const [loading, setLoading] = useState(false);
            const [expandedEmp, setExpandedEmp] = useState(null);

            const loadAll = useCallback(async () => {
                setLoading(true);
                try {
                    const [attRes, settRes, holRes] = await Promise.all([
                        postAction(scriptUrl, token, 'list_attendance', { month }),
                        postAction(scriptUrl, token, 'list_settings'),
                        postAction(scriptUrl, token, 'list_holidays'),
                    ]);
                    setAttData(attRes.records || []);
                    setSettings(settRes.settings || {});
                    setHolidays(holRes.holidays || []);
                } catch {} finally { setLoading(false); }
            }, [scriptUrl, token, month]);

            useEffect(() => { loadAll(); }, [loadAll]);

            const holidayMap = useMemo(() => {
                const m = {};
                holidays.forEach(h => { m[h.date] = h; });
                return m;
            }, [holidays]);

            const otRate = parseFloat(settings.ot_rate_default) || 50;

            // คำนวณ OT รายคน รายวัน
            const otSummary = useMemo(() => {
                const empMap = {};
                attData.forEach(r => {
                    if (!r.employee) return;
                    if (!empMap[r.employee]) empMap[r.employee] = { employee: r.employee, days: [] };

                    const empInfo  = employees.find(e => e.name === r.employee);
                    const otBonus  = empInfo ? (parseFloat(empInfo.otBonus) || 0) : 0;
                    const hourRate = otRate + otBonus;
                    const holiday  = holidayMap[r.date];
                    const mult     = holiday ? (parseFloat(holiday.multiplier) || 1) : 1;
                    const holBonus = (holiday && r.otHours > 0) ? (parseFloat(holiday.bonus) || 0) : 0;
                    const otPay    = r.otHours > 0 ? (r.otHours * hourRate * mult + holBonus) : 0;

                    empMap[r.employee].days.push({
                        date: r.date, checkIn: r.checkIn, checkOut: r.checkOut,
                        otHours: r.otHours, hourRate, mult, holBonus, otPay,
                        isHoliday: !!holiday, holidayNote: holiday ? holiday.note : '',
                    });
                });
                return Object.values(empMap).map(e => {
                    const empInfo   = employees.find(emp => emp.name === e.employee);
                    const otBonus   = empInfo ? (parseFloat(empInfo.otBonus) || 0) : 0;
                    const dept      = empInfo ? (empInfo.department || '') : '';
                    const totalHours = e.days.reduce((s, d) => s + (d.otHours || 0), 0);
                    const totalPay   = e.days.reduce((s, d) => s + d.otPay, 0);
                    return { ...e, dept, otBonus, effectiveRate: otRate + otBonus, totalHours, totalPay };
                }).filter(e => e.totalHours > 0)
                  .sort((a, b) => b.totalPay - a.totalPay);
            }, [attData, employees, otRate, holidayMap]);

            const grand = useMemo(() => ({
                hours: otSummary.reduce((s, e) => s + e.totalHours, 0),
                pay:   otSummary.reduce((s, e) => s + e.totalPay, 0),
            }), [otSummary]);

            const fmt  = (n) => Math.round(n).toLocaleString();
            const fmtH = (n) => n % 1 === 0 ? n.toString() : n.toFixed(1);

            return (
                <div className="space-y-4">
                    {/* Controls */}
                    <div className="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
                        <h2 className="text-lg font-bold text-cream flex items-center gap-2">
                            <ZapIcon className="w-5 h-5 text-ochre"/> คำนวณ OT
                            <span className="text-xs font-medium text-latte bg-coffee2 px-2 py-0.5 rounded-full">{otSummary.length} คนมี OT</span>
                        </h2>
                        <div className="flex gap-2 items-center flex-wrap">
                            <span className="text-xs text-latte bg-coffee2 border border-bean px-3 py-1.5 rounded-lg font-mono">
                                เรต OT: <span className="text-ochre font-bold">{otRate}</span> บ./ชม.
                            </span>
                            <input type="month" value={month} onChange={e => setMonth(e.target.value)} className={inputCls + " w-40"}/>
                            <button onClick={loadAll} disabled={loading} className="p-2 rounded-lg bg-coffee2 text-latte hover:text-cream disabled:opacity-50">
                                <RefreshCwIcon className={`w-4 h-4 ${loading ? 'animate-spin' : ''}`}/>
                            </button>
                        </div>
                    </div>

                    {/* Summary cards */}
                    <div className="grid grid-cols-3 gap-3">
                        <div className="bg-coffee border border-bean rounded-xl p-4 text-center">
                            <div className="text-2xl font-bold text-ochre">{otSummary.length}</div>
                            <div className="text-xs text-latte mt-1">คนมี OT</div>
                        </div>
                        <div className="bg-coffee border border-bean rounded-xl p-4 text-center">
                            <div className="text-2xl font-bold text-cream">{fmtH(grand.hours)}</div>
                            <div className="text-xs text-latte mt-1">ชม. OT รวม</div>
                        </div>
                        <div className="bg-coffee border border-bean rounded-xl p-4 text-center">
                            <div className="text-2xl font-bold text-olive">฿{fmt(grand.pay)}</div>
                            <div className="text-xs text-latte mt-1">ค่า OT รวม</div>
                        </div>
                    </div>

                    {/* Empty state */}
                    {!loading && attData.length === 0 && (
                        <div className="bg-coffee border border-bean rounded-xl p-10 text-center text-latte text-sm space-y-2">
                            <ZapIcon className="w-12 h-12 mx-auto mb-3 opacity-20"/>
                            <p className="font-medium">ยังไม่มีข้อมูลเข้างานในเดือนนี้</p>
                            <p className="text-xs text-latte/60">ต้องมีข้อมูลในแท็บ <span className="font-mono bg-coffee2 px-1.5 py-0.5 rounded text-cream">เข้างาน</span> ก่อน จึงจะคำนวณ OT ได้</p>
                        </div>
                    )}
                    {!loading && attData.length > 0 && otSummary.length === 0 && (
                        <div className="bg-coffee border border-bean rounded-xl p-8 text-center text-latte text-sm">
                            <CheckCircleIcon className="w-10 h-10 mx-auto mb-3 opacity-20"/>
                            <p>ไม่มีพนักงานที่ทำ OT ในเดือนนี้</p>
                        </div>
                    )}

                    {/* Table */}
                    {otSummary.length > 0 && (
                        <div className="bg-coffee border border-bean rounded-xl overflow-hidden">
                            {loading ? (
                                <div className="p-8 text-center text-latte text-sm">กำลังคำนวณ...</div>
                            ) : (
                                <table className="w-full text-left border-collapse min-w-[580px]">
                                    <thead className="bg-coffee2/50">
                                        <tr>
                                            <th className="p-3 text-xs font-semibold text-latte uppercase">พนักงาน</th>
                                            <th className="p-3 text-xs font-semibold text-latte uppercase text-center">เรต (บ./ชม.)</th>
                                            <th className="p-3 text-xs font-semibold text-latte uppercase text-center">ชม. OT</th>
                                            <th className="p-3 text-xs font-semibold text-latte uppercase text-right">ค่า OT (บาท)</th>
                                            <th className="p-3 w-10"></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {otSummary.map(e => (
                                            <React.Fragment key={e.employee}>
                                                <tr
                                                    className="border-t border-bean hover:bg-coffee2/40 cursor-pointer transition-colors"
                                                    onClick={() => setExpandedEmp(expandedEmp === e.employee ? null : e.employee)}
                                                >
                                                    <td className="p-3 text-sm text-cream font-medium">
                                                        <div>{e.employee}</div>
                                                        {e.dept && <div className="text-[11px] text-ochre">{e.dept}</div>}
                                                        {e.otBonus > 0 && <div className="text-[10px] text-latte">+{e.otBonus} บ. bonus/ชม.</div>}
                                                    </td>
                                                    <td className="p-3 text-sm font-mono text-center">
                                                        <span className="text-cream">{e.effectiveRate}</span>
                                                        {e.otBonus > 0 && <span className="text-xs text-latte"> ({otRate}+{e.otBonus})</span>}
                                                    </td>
                                                    <td className="p-3 text-sm font-mono text-center font-bold text-cream">{fmtH(e.totalHours)}</td>
                                                    <td className="p-3 text-sm font-mono text-right font-bold text-olive">฿{fmt(e.totalPay)}</td>
                                                    <td className="p-3 text-center text-latte text-xs">{expandedEmp === e.employee ? '▲' : '▼'}</td>
                                                </tr>
                                                {expandedEmp === e.employee && (
                                                    <tr className="border-t border-bean/40">
                                                        <td colSpan={5} className="p-0">
                                                            <div className="bg-coffee2/30 border-b border-bean">
                                                                <table className="w-full text-left border-collapse">
                                                                    <thead>
                                                                        <tr className="border-b border-bean/40">
                                                                            <th className="px-6 py-2 text-[10px] text-latte/70 uppercase">วันที่</th>
                                                                            <th className="px-3 py-2 text-[10px] text-latte/70 uppercase text-center">เข้า-ออก</th>
                                                                            <th className="px-3 py-2 text-[10px] text-latte/70 uppercase text-center">OT ชม.</th>
                                                                            <th className="px-3 py-2 text-[10px] text-latte/70 uppercase text-center">เรต × mult</th>
                                                                            <th className="px-3 py-2 text-[10px] text-latte/70 uppercase text-right">ค่า OT</th>
                                                                        </tr>
                                                                    </thead>
                                                                    <tbody>
                                                                        {e.days.filter(d => d.otHours > 0).sort((a,b) => a.date.localeCompare(b.date)).map(d => (
                                                                            <tr key={d.date} className="border-t border-bean/20 hover:bg-coffee2/20">
                                                                                <td className="px-6 py-2 text-xs font-mono text-cream">
                                                                                    {d.date}
                                                                                    {d.isHoliday && <span className="ml-1.5 text-[9px] bg-caramel/15 text-caramel px-1 rounded">วันพิเศษ{d.holidayNote ? ` (${d.holidayNote})` : ''}</span>}
                                                                                </td>
                                                                                <td className="px-3 py-2 text-xs font-mono text-latte text-center">{d.checkIn || '-'}→{d.checkOut || '-'}</td>
                                                                                <td className="px-3 py-2 text-xs font-mono text-center font-bold text-cream">{fmtH(d.otHours)}</td>
                                                                                <td className="px-3 py-2 text-xs font-mono text-center text-latte">
                                                                                    {d.hourRate}{d.mult > 1 ? <span className="text-caramel">×{d.mult}</span> : ''}
                                                                                    {d.holBonus > 0 && <span className="text-olive ml-1">+{d.holBonus}</span>}
                                                                                </td>
                                                                                <td className="px-3 py-2 text-xs font-mono text-right text-olive font-bold">฿{fmt(d.otPay)}</td>
                                                                            </tr>
                                                                        ))}
                                                                    </tbody>
                                                                </table>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                )}
                                            </React.Fragment>
                                        ))}
                                        {/* Grand total row */}
                                        <tr className="border-t-2 border-ochre/40 bg-coffee2/30">
                                            <td className="p-3 text-sm font-bold text-cream" colSpan={2}>รวมทั้งหมด</td>
                                            <td className="p-3 text-sm font-mono text-center font-bold text-cream">{fmtH(grand.hours)}</td>
                                            <td className="p-3 text-sm font-mono text-right font-bold text-olive">฿{fmt(grand.pay)}</td>
                                            <td></td>
                                        </tr>
                                    </tbody>
                                </table>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // --- Penalty View (แพ็คผิด / ค่าปรับ) ---
        const PenaltyView = ({ scriptUrl, token, employees, departments }) => {
            const now = new Date();
            const defaultMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
            const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

            const [month, setMonth] = useState(defaultMonth);
            const [mode, setMode] = useState('individual');
            const [penalties, setPenalties] = useState([]);
            const [penRate, setPenRate] = useState(50);
            const [loading, setLoading] = useState(false);
            const [saving, setSaving] = useState(false);
            const [msg, setMsg] = useState({ text: '', ok: true });

            const [fDate, setFDate] = useState(todayStr);
            const [fEmployee, setFEmployee] = useState('');
            const [fDept, setFDept] = useState('');
            const [fProduct, setFProduct] = useState('');
            const [fBags, setFBags] = useState('');
            const [fRate, setFRate] = useState('');

            const loadAll = useCallback(async () => {
                setLoading(true);
                try {
                    const [penRes, settRes] = await Promise.all([
                        postAction(scriptUrl, token, 'list_penalties', { month }),
                        postAction(scriptUrl, token, 'list_settings'),
                    ]);
                    setPenalties(penRes.penalties || []);
                    const rate = parseFloat((settRes.settings || {}).penalty_rate_default) || 50;
                    setPenRate(rate);
                } catch {} finally { setLoading(false); }
            }, [scriptUrl, token, month]);

            useEffect(() => { loadAll(); }, [loadAll]);

            const deptEmployees = useMemo(() => {
                if (!fDept) return [];
                return employees.filter(e => e.department === fDept);
            }, [fDept, employees]);

            const bags = parseFloat(fBags) || 0;
            const rate = parseFloat(fRate) || penRate;
            const totalAmount = bags * rate;
            const perPerson = deptEmployees.length > 0 ? totalAmount / deptEmployees.length : 0;

            const showMsg = (text, ok) => {
                setMsg({ text, ok: ok !== false });
                setTimeout(() => setMsg({ text: '', ok: true }), 4000);
            };

            const resetForm = () => { setFEmployee(''); setFDept(''); setFProduct(''); setFBags(''); setFRate(''); };

            const handleSave = async () => {
                if (!fDate) { showMsg('กรุณาเลือกวันที่', false); return; }
                if (!fBags || bags <= 0) { showMsg('กรุณากรอกจำนวนซอง', false); return; }
                setSaving(true);
                try {
                    if (mode === 'individual') {
                        if (!fEmployee) { showMsg('กรุณาเลือกพนักงาน', false); setSaving(false); return; }
                        const empInfo = employees.find(e => e.name === fEmployee);
                        await postAction(scriptUrl, token, 'add_penalty', {
                            penalty: {
                                date: fDate, employee: fEmployee,
                                dept: (empInfo && empInfo.department) || '', product: fProduct,
                                bags: bags, rate: rate, amount: totalAmount, mode: 'individual',
                            }
                        });
                        showMsg('บันทึกแล้ว — หัก ' + fEmployee + ' ฿' + Math.round(totalAmount).toLocaleString());
                    } else {
                        if (!fDept) { showMsg('กรุณาเลือกแผนก', false); setSaving(false); return; }
                        if (deptEmployees.length === 0) { showMsg('ไม่มีพนักงานในแผนกนี้ — กำหนดแผนกก่อนที่หน้าพนักงาน', false); setSaving(false); return; }
                        const penaltiesArr = deptEmployees.map(emp => ({
                            date: fDate, employee: emp.name, dept: fDept, product: fProduct,
                            bags: bags, rate: rate, amount: perPerson, mode: 'collective',
                        }));
                        await postAction(scriptUrl, token, 'bulk_add_penalty', { penalties: penaltiesArr });
                        showMsg('บันทึกแล้ว — หักทั้งแผนก ' + fDept + ' (' + deptEmployees.length + ' คน) คนละ ฿' + Math.round(perPerson).toLocaleString());
                    }
                    resetForm();
                    loadAll();
                } catch (e) { showMsg('ผิดพลาด: ' + e.message, false); }
                finally { setSaving(false); }
            };

            const handleDelete = async (rowIndex, employee, amount) => {
                if (!window.confirm('ลบบันทึก ' + (employee || '—') + ' หัก ฿' + Math.round(amount).toLocaleString() + '?')) return;
                try { await postAction(scriptUrl, token, 'delete_penalty', { rowIndex }); loadAll(); }
                catch (e) { alert('ผิดพลาด: ' + e.message); }
            };

            const summary = useMemo(() => ({
                count: penalties.length,
                totalAmount: penalties.reduce((s, p) => s + (p.amount || 0), 0),
                uniqueEmp: new Set(penalties.map(p => p.employee).filter(Boolean)).size,
            }), [penalties]);

            const empNames = useMemo(() => employees.map(e => e.name).sort(), [employees]);
            const deptNames = useMemo(() => departments.map(d => d.name), [departments]);
            const modeBtnCls = (m) => `px-4 py-2 text-sm font-medium rounded-lg transition-colors ${mode === m ? 'bg-ochre text-espresso' : 'text-latte hover:text-cream hover:bg-coffee2'}`;

            return (
                <div className="space-y-4">
                    {/* Header */}
                    <div className="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
                        <h2 className="text-lg font-bold text-cream flex items-center gap-2">
                            <AlertTriangleIcon className="w-5 h-5 text-rust"/> แพ็คผิด / ค่าปรับ
                            <span className="text-xs font-medium text-latte bg-coffee2 px-2 py-0.5 rounded-full">{penalties.length} รายการ</span>
                        </h2>
                        <div className="flex gap-2 items-center flex-wrap">
                            <span className="text-xs text-latte bg-coffee2 border border-bean px-3 py-1.5 rounded-lg font-mono">
                                เรต: <span className="text-rust font-bold">{penRate}</span> บ./ซอง
                            </span>
                            <input type="month" value={month} onChange={e => setMonth(e.target.value)} className={inputCls + " w-40"}/>
                            <button onClick={loadAll} disabled={loading} className="p-2 rounded-lg bg-coffee2 text-latte hover:text-cream disabled:opacity-50" title="รีเฟรช">
                                <RefreshCwIcon className={'w-4 h-4 ' + (loading ? 'animate-spin' : '')}/>
                            </button>
                        </div>
                    </div>

                    {/* Summary cards */}
                    <div className="grid grid-cols-3 gap-3">
                        <div className="bg-coffee border border-bean rounded-xl p-4 text-center">
                            <div className="text-2xl font-bold text-rust">{summary.count}</div>
                            <div className="text-xs text-latte mt-1">รายการ</div>
                        </div>
                        <div className="bg-coffee border border-bean rounded-xl p-4 text-center">
                            <div className="text-2xl font-bold text-cream">{summary.uniqueEmp}</div>
                            <div className="text-xs text-latte mt-1">พนักงานถูกหัก</div>
                        </div>
                        <div className="bg-coffee border border-bean rounded-xl p-4 text-center">
                            <div className="text-2xl font-bold text-rust">฿{Math.round(summary.totalAmount).toLocaleString()}</div>
                            <div className="text-xs text-latte mt-1">ยอดหักรวม</div>
                        </div>
                    </div>

                    {/* Add form */}
                    <div className="bg-coffee border border-bean rounded-xl overflow-hidden">
                        <div className="p-4 border-b border-bean flex items-center justify-between flex-wrap gap-3">
                            <h3 className="text-sm font-bold text-cream flex items-center gap-2">
                                <PlusIcon className="w-4 h-4 text-ochre"/> เพิ่มรายการค่าปรับ
                            </h3>
                            <div className="flex gap-1 bg-coffee2 rounded-lg p-1">
                                <button className={modeBtnCls('individual')} onClick={() => setMode('individual')}>รายบุคคล</button>
                                <button className={modeBtnCls('collective')} onClick={() => setMode('collective')}>ทั้งแผนก</button>
                            </div>
                        </div>
                        <div className="p-4">
                            <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 items-end">
                                <div>
                                    <label className="block text-xs font-medium text-latte mb-1">วันที่</label>
                                    <input type="date" value={fDate} onChange={e => setFDate(e.target.value)} className={inputCls}/>
                                </div>
                                {mode === 'individual' ? (
                                    <div>
                                        <label className="block text-xs font-medium text-latte mb-1">พนักงาน</label>
                                        <select value={fEmployee} onChange={e => setFEmployee(e.target.value)} className={inputCls}>
                                            <option value="">— เลือกพนักงาน —</option>
                                            {empNames.map(n => <option key={n} value={n}>{n}</option>)}
                                        </select>
                                    </div>
                                ) : (
                                    <div>
                                        <label className="block text-xs font-medium text-latte mb-1">แผนก</label>
                                        <select value={fDept} onChange={e => setFDept(e.target.value)} className={inputCls}>
                                            <option value="">— เลือกแผนก —</option>
                                            {deptNames.map(n => <option key={n} value={n}>{n}</option>)}
                                        </select>
                                    </div>
                                )}
                                <div>
                                    <label className="block text-xs font-medium text-latte mb-1">รุ่นสินค้า</label>
                                    <input value={fProduct} onChange={e => setFProduct(e.target.value)} className={inputCls} placeholder="เช่น ABC-01"/>
                                </div>
                                <div>
                                    <label className="block text-xs font-medium text-latte mb-1">จำนวนซอง</label>
                                    <input type="number" min="1" value={fBags} onChange={e => setFBags(e.target.value)} className={inputCls} placeholder="0"/>
                                </div>
                                <div>
                                    <label className="block text-xs font-medium text-latte mb-1">เรต (บ./ซอง)</label>
                                    <input type="number" min="0" value={fRate} onChange={e => setFRate(e.target.value)} className={inputCls} placeholder={String(penRate)}/>
                                </div>
                                <div>
                                    <label className="block text-xs font-medium text-latte mb-1">
                                        {mode === 'individual' ? 'ยอดหัก' : ('ยอดหัก/คน' + (deptEmployees.length > 0 ? ' (' + deptEmployees.length + ' คน)' : ''))}
                                    </label>
                                    <div className={inputCls + ' bg-coffee2/50 text-right font-mono font-bold ' + (totalAmount > 0 ? 'text-rust' : 'text-latte/50')}>
                                        {mode === 'individual'
                                            ? (totalAmount > 0 ? '฿' + Math.round(totalAmount).toLocaleString() : '-')
                                            : (perPerson > 0 ? '฿' + Math.round(perPerson).toLocaleString() : '-')}
                                    </div>
                                </div>
                                <div className="flex items-end">
                                    <button onClick={handleSave} disabled={saving || loading}
                                        className="w-full px-4 py-2 text-sm font-medium bg-rust text-cream rounded-lg hover:brightness-110 disabled:opacity-60">
                                        {saving ? 'กำลังบันทึก...' : 'บันทึก'}
                                    </button>
                                </div>
                            </div>

                            {/* Collective preview */}
                            {mode === 'collective' && fDept && deptEmployees.length > 0 && bags > 0 && (
                                <div className="mt-3 p-3 bg-coffee2/30 rounded-lg border border-bean text-xs text-latte">
                                    <p className="font-medium text-cream mb-1.5">พนักงานที่จะถูกหัก ({deptEmployees.length} คน):</p>
                                    <div className="flex flex-wrap gap-1.5">
                                        {deptEmployees.map(e => (
                                            <span key={e.name} className="px-2 py-0.5 bg-rust/15 text-rust rounded-full border border-rust/30">{e.name}</span>
                                        ))}
                                    </div>
                                </div>
                            )}
                            {mode === 'collective' && fDept && deptEmployees.length === 0 && (
                                <p className="mt-2 text-xs text-caramel">⚠️ แผนกนี้ยังไม่มีพนักงาน — กำหนดแผนกให้พนักงานก่อนที่หน้า "พนักงาน"</p>
                            )}
                            {msg.text && <p className={'mt-2 text-xs ' + (msg.ok ? 'text-olive' : 'text-rust')}>{msg.text}</p>}
                        </div>
                    </div>

                    {/* Table */}
                    {!loading && penalties.length === 0 ? (
                        <div className="bg-coffee border border-bean rounded-xl p-10 text-center text-latte text-sm space-y-2">
                            <AlertTriangleIcon className="w-12 h-12 mx-auto mb-3 opacity-20"/>
                            <p className="font-medium">ยังไม่มีรายการค่าปรับในเดือนนี้</p>
                        </div>
                    ) : (
                        <div className="bg-coffee border border-bean rounded-xl overflow-hidden">
                            {loading ? (
                                <div className="p-8 text-center text-latte text-sm">กำลังโหลด...</div>
                            ) : (
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse min-w-[680px]">
                                        <thead className="bg-coffee2/50">
                                            <tr>
                                                <th className="p-3 text-xs font-semibold text-latte uppercase">วันที่</th>
                                                <th className="p-3 text-xs font-semibold text-latte uppercase">พนักงาน</th>
                                                <th className="p-3 text-xs font-semibold text-latte uppercase">แผนก</th>
                                                <th className="p-3 text-xs font-semibold text-latte uppercase">รุ่นสินค้า</th>
                                                <th className="p-3 text-xs font-semibold text-latte uppercase text-center">ซอง</th>
                                                <th className="p-3 text-xs font-semibold text-latte uppercase text-center">เรต</th>
                                                <th className="p-3 text-xs font-semibold text-latte uppercase text-right">ยอดหัก</th>
                                                <th className="p-3 text-xs font-semibold text-latte uppercase text-center">โหมด</th>
                                                <th className="p-3"></th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-bean">
                                            {penalties.map((p, i) => (
                                                <tr key={p.rowIndex + '-' + i} className="hover:bg-coffee2/40 transition-colors">
                                                    <td className="p-3 text-sm text-cream font-mono">{p.date}</td>
                                                    <td className="p-3 text-sm text-cream font-medium">{p.employee || '-'}</td>
                                                    <td className="p-3 text-sm text-latte">
                                                        {p.dept ? <span className="text-[11px] bg-ochre/10 text-ochre px-2 py-0.5 rounded-full">{p.dept}</span> : <span className="text-latte/40">-</span>}
                                                    </td>
                                                    <td className="p-3 text-sm text-latte">{p.product || '-'}</td>
                                                    <td className="p-3 text-sm text-center font-mono text-cream">{p.bags}</td>
                                                    <td className="p-3 text-sm text-center font-mono text-latte">{p.rate}</td>
                                                    <td className="p-3 text-sm text-right font-mono font-bold text-rust">฿{Math.round(p.amount).toLocaleString()}</td>
                                                    <td className="p-3 text-center">
                                                        <span className={'text-[10px] px-2 py-0.5 rounded-full ' + (p.mode === 'collective' ? 'bg-caramel/15 text-caramel' : 'bg-coffee2 text-latte')}>
                                                            {p.mode === 'collective' ? 'ทั้งแผนก' : 'รายบุคคล'}
                                                        </span>
                                                    </td>
                                                    <td className="p-3 text-right">
                                                        <button onClick={() => handleDelete(p.rowIndex, p.employee, p.amount)} className="p-1.5 rounded-lg text-latte hover:text-rust hover:bg-coffee2">
                                                            <Trash2Icon className="w-4 h-4"/>
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                            {/* Grand total row */}
                                            <tr className="border-t-2 border-rust/30 bg-coffee2/30">
                                                <td className="p-3 text-sm font-bold text-cream" colSpan={6}>รวมทั้งหมด</td>
                                                <td className="p-3 text-sm font-mono text-right font-bold text-rust">฿{Math.round(summary.totalAmount).toLocaleString()}</td>
                                                <td colSpan={2}></td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // --- Navigation config (section ทั้งหมด — ready=false คือ placeholder รอ phase หลัง) ---
        const NAV_ITEMS = [
            { key: 'dashboard',  label: 'แดชบอร์ด', Icon: LayoutDashboardIcon, ready: true },
            { key: 'directory',  label: 'พนักงาน',  Icon: UsersIcon,           ready: true },
            { key: 'attendance', label: 'เข้างาน',   Icon: ClockIcon,           ready: true  },
            { key: 'ot',         label: 'OT',        Icon: ZapIcon,             ready: true  },
            { key: 'penalty',    label: 'ค่าปรับ',   Icon: AlertTriangleIcon,   ready: true  },
            { key: 'payroll',    label: 'เงินเดือน', Icon: WalletIcon,          ready: false },
            { key: 'settings',   label: 'ตั้งค่า',   Icon: SettingsIcon,        ready: true  },
        ];

        // --- Sidebar rail (desktop) ---
        const SidebarRail = ({ view, setView }) => {
            const itemCls = (active) => `w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors ${active ? 'bg-ochre text-espresso' : 'text-latte hover:text-cream hover:bg-coffee2'}`;
            return (
                <aside className="no-print hidden md:flex flex-col w-56 shrink-0 bg-coffee border-r border-bean sticky top-0 h-screen">
                    <div className="px-4 py-4 flex items-center gap-3 border-b border-bean">
                        <div className="bg-ochre p-2 rounded-lg"><LayoutDashboardIcon className="w-5 h-5 text-espresso"/></div>
                        <h1 className="text-lg font-bold leading-none text-cream">HR Manager</h1>
                    </div>
                    <nav className="flex-1 p-3 space-y-1 overflow-y-auto">
                        {NAV_ITEMS.map(it => {
                            const Icon = it.Icon;
                            return (
                                <button key={it.key} onClick={() => setView(it.key)} className={itemCls(view === it.key)}>
                                    <Icon className="w-5 h-5 shrink-0"/>
                                    <span>{it.label}</span>
                                    {!it.ready && <span className="ml-auto text-[9px] px-1.5 py-0.5 rounded-full bg-coffee2 text-latte/70 font-normal">เร็วๆนี้</span>}
                                </button>
                            );
                        })}
                    </nav>
                </aside>
            );
        };

        // --- Mobile bottom nav ---
        const MobileNav = ({ view, setView }) => (
            <nav className="no-print md:hidden fixed bottom-0 inset-x-0 z-50 bg-coffee border-t border-bean flex justify-around px-1 py-1">
                {NAV_ITEMS.map(it => {
                    const Icon = it.Icon;
                    const active = view === it.key;
                    return (
                        <button key={it.key} onClick={() => setView(it.key)}
                            className={`flex flex-col items-center gap-0.5 px-1 py-1.5 rounded-lg flex-1 ${active ? 'text-ochre' : 'text-latte'}`}>
                            <Icon className="w-5 h-5"/>
                            <span className="text-[10px] leading-none">{it.label}</span>
                        </button>
                    );
                })}
            </nav>
        );

        // --- Placeholder view (section ที่ยังไม่สร้าง) ---
        const ComingSoon = ({ label, Icon }) => (
            <div className="bg-coffee rounded-xl border border-bean p-12 text-center">
                <div className="w-16 h-16 mx-auto rounded-2xl bg-ochre/10 flex items-center justify-center text-ochre/60 mb-4">
                    {Icon ? <Icon className="w-8 h-8"/> : null}
                </div>
                <h2 className="text-xl font-bold text-cream">{label}</h2>
                <p className="text-sm text-latte mt-2">เร็วๆ นี้ — อยู่ระหว่างพัฒนา</p>
            </div>
        );

        // --- App ---
        function App() {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [sheetData, setSheetData] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [uiScriptUrl, setUiScriptUrl] = useState(() => localStorage.getItem('hr_script_url') || APPS_SCRIPT_URL);
            const [isAddLeaveOpen, setIsAddLeaveOpen] = useState(false);
            const [addLeaveDay, setAddLeaveDay] = useState('');
            const [view, setView] = useState('dashboard');
            const [employees, setEmployees] = useState([]);
            const [empLoading, setEmpLoading] = useState(false);
            const [isEmpModalOpen, setIsEmpModalOpen] = useState(false);
            const [editingEmp, setEditingEmp] = useState(null);
            const [departments, setDepartments] = useState([]);

            // --- auth ---
            const [token, setToken] = useState(() => sessionStorage.getItem('hr_token') || '');
            const [authed, setAuthed] = useState(false);
            const [authChecking, setAuthChecking] = useState(true);
            const [loginBusy, setLoginBusy] = useState(false);
            const [loginError, setLoginError] = useState('');

            // รายชื่อสำหรับ dropdown: ใช้จาก directory ก่อน (ถ้ามี) ไม่งั้น fallback จากธุรกรรม
            const employeeNames = useMemo(() => {
                if (employees.length) return employees.map(e => e.name).filter(Boolean).sort();
                return [...new Set(sheetData.map(d => d.name).filter(Boolean))].sort();
            }, [employees, sheetData]);

            // ดึงข้อมูลด้วย token; คืน {auth:boolean, ok:boolean}
            const fetchData = useCallback(async (tk) => {
                const useToken = tk !== undefined ? tk : token;
                const targetUrl = uiScriptUrl || APPS_SCRIPT_URL;
                if (!targetUrl || targetUrl.includes("XXXX")) { setSheetData(MOCK_DATA); return { auth: true, ok: true }; }
                setLoading(true); setError(null);
                try {
                    const response = await fetch(`${targetUrl}?token=${encodeURIComponent(useToken)}&t=${Date.now()}`, { method: "GET", credentials: 'omit' });
                    if (!response.ok) throw new Error("network");
                    const json = JSON.parse(await response.text());
                    if (json && json.error === 'unauthorized') { return { auth: false, ok: false }; }
                    if (Array.isArray(json)) { setSheetData(json); return { auth: true, ok: true }; }
                    throw new Error("รูปแบบข้อมูลไม่ถูกต้อง");
                } catch (err) {
                    setError("เชื่อมต่อ Google Sheet ไม่ได้");
                    return { auth: true, ok: false }; // เชื่อมต่อพลาด แต่ token ยังถือว่าใช้ได้
                } finally { setLoading(false); }
            }, [uiScriptUrl, token]);

            // โหลดรายชื่อพนักงาน (directory)
            const loadEmployees = useCallback(async (tk) => {
                const useToken = tk !== undefined ? tk : token;
                const targetUrl = uiScriptUrl || APPS_SCRIPT_URL;
                if (!targetUrl || targetUrl.includes("XXXX")) return;
                setEmpLoading(true);
                try {
                    const data = await postAction(targetUrl, useToken, 'list_employees');
                    setEmployees(data.employees || []);
                } catch (e) { /* เงียบไว้ — แสดงว่าง */ }
                finally { setEmpLoading(false); }
            }, [uiScriptUrl, token]);

            // โหลดแผนก (ใช้ใน EmployeeModal dropdown + SettingsView)
            const loadDepartments = useCallback(async (tk) => {
                const useToken = tk !== undefined ? tk : token;
                const targetUrl = uiScriptUrl || APPS_SCRIPT_URL;
                if (!targetUrl || targetUrl.includes("XXXX")) return;
                try {
                    const data = await postAction(targetUrl, useToken, 'list_departments');
                    setDepartments(data.departments || []);
                } catch {}
            }, [uiScriptUrl, token]);

            // เช็ค token ตอนเปิดแอป
            useEffect(() => {
                (async () => {
                    if (!token) { setAuthChecking(false); return; }
                    const res = await fetchData(token);
                    if (res.auth) { setAuthed(true); loadEmployees(token); loadDepartments(token); } else { sessionStorage.removeItem('hr_token'); setToken(''); }
                    setAuthChecking(false);
                })();
            }, []);

            const doLogin = async (pass) => {
                setLoginBusy(true); setLoginError('');
                const res = await fetchData(pass);
                if (res.auth) { setToken(pass); sessionStorage.setItem('hr_token', pass); setAuthed(true); loadEmployees(pass); loadDepartments(pass); }
                else setLoginError('รหัสผ่านไม่ถูกต้อง');
                setLoginBusy(false);
            };

            const logout = () => { sessionStorage.removeItem('hr_token'); setToken(''); setAuthed(false); setSheetData([]); setEmployees([]); setDepartments([]); };

            const openAddEmp = () => { setEditingEmp(null); setIsEmpModalOpen(true); };
            const openEditEmp = (e) => { setEditingEmp(e); setIsEmpModalOpen(true); };
            const deleteEmp = async (e) => {
                if (!window.confirm(`ลบ "${e.name}" ออกจากรายชื่อ?\n(ประวัติเบิก/ลาเดิมใน data ยังอยู่)`)) return;
                try { await postAction(uiScriptUrl || APPS_SCRIPT_URL, token, 'delete_employee', { name: e.name }); loadEmployees(); }
                catch (err) { alert('ลบไม่สำเร็จ: ' + err.message); }
            };

            const leaveData = sheetData.filter(d => d.type && d.type.includes('หยุด'));
            const handleChangeMonth = (delta) => { const n = new Date(currentDate); n.setMonth(n.getMonth() + delta); setCurrentDate(n); };
            const handleAddLeave = (dateStr) => { setAddLeaveDay(dateStr); setIsAddLeaveOpen(true); };

            const navBtn = "p-2 rounded-full bg-coffee2 text-latte hover:text-cream transition-colors";

            if (authChecking) {
                return <div className="min-h-screen flex items-center justify-center bg-espresso text-latte">กำลังโหลด...</div>;
            }
            if (!authed) {
                return <LoginScreen onLogin={doLogin} error={loginError} busy={loginBusy} />;
            }

            const currentItem = NAV_ITEMS.find(it => it.key === view) || NAV_ITEMS[0];

            return (
                <div className="min-h-screen flex bg-espresso text-cream font-sans">
                    <SidebarRail view={view} setView={setView}/>

                    <div className="flex-1 flex flex-col min-w-0">
                        <header className="no-print bg-coffee border-b border-bean px-4 md:px-6 py-3 flex justify-between items-center sticky top-0 z-40 shadow-sm">
                            <div className="flex items-center gap-3">
                                <div className="md:hidden bg-ochre p-2 rounded-lg"><LayoutDashboardIcon className="w-5 h-5 text-espresso"/></div>
                                <div>
                                    <h1 className="text-lg font-bold leading-none text-cream">{currentItem.label}</h1>
                                    <div className="text-[10px] md:text-xs mt-0.5">
                                        {loading ? <span className="text-ochre animate-pulse">● กำลังโหลด...</span>
                                            : error ? <span className="text-rust">● เชื่อมต่อไม่ได้</span>
                                            : <span className="text-olive">● Online</span>}
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <button onClick={() => handleAddLeave('')} className="hidden sm:flex items-center gap-1.5 px-3 py-2 rounded-lg bg-ochre text-espresso text-sm font-semibold hover:brightness-110" title="เพิ่มข้อมูล">
                                    <PlusIcon className="w-4 h-4"/> เพิ่มข้อมูล
                                </button>
                                <button onClick={() => handleAddLeave('')} className="sm:hidden p-2 rounded-full bg-ochre text-espresso" title="เพิ่มข้อมูล"><PlusIcon className="w-5 h-5"/></button>
                                <button onClick={() => window.print()} className={navBtn} title="พิมพ์ / PDF">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>
                                </button>
                                <button onClick={() => setIsSettingsOpen(true)} className={navBtn} title="ตั้งค่า URL"><SettingsIcon className="w-5 h-5"/></button>
                                <button onClick={() => fetchData()} disabled={loading} className={navBtn} title="รีเฟรช"><RefreshCwIcon className={`w-5 h-5 ${loading ? 'animate-spin' : ''}`}/></button>
                                <button onClick={logout} className={navBtn} title="ออกจากระบบ"><LogOutIcon className="w-5 h-5"/></button>
                            </div>
                        </header>

                        <main className="max-w-7xl w-full mx-auto p-4 md:p-6 space-y-6 pb-24 md:pb-10">
                            {error && (
                                <div className="no-print border border-rust/40 bg-rust/10 p-4 rounded-lg">
                                    <div className="flex items-start gap-3">
                                        <XCircleIcon className="w-6 h-6 text-rust mt-0.5 shrink-0"/>
                                        <div className="flex-1">
                                            <h3 className="font-bold text-sm text-rust">เชื่อมต่อข้อมูลจริงไม่ได้</h3>
                                            <p className="text-xs mt-1 text-rust/80">ตรวจสอบ Apps Script URL ที่ ⚙️ ตั้งค่า หรือเช็คว่า deploy ใหม่แล้ว</p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {view === 'dashboard' && (
                                <>
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                        <div className="lg:col-span-2">
                                            <CalendarView leaveData={leaveData} currentMonth={currentDate.getMonth()} currentYear={currentDate.getFullYear()} onChangeMonth={handleChangeMonth} onAddLeave={handleAddLeave}/>
                                        </div>
                                        <div className="lg:col-span-1">
                                            <MonthlySummaryTable allData={sheetData} currentMonth={currentDate.getMonth()} currentYear={currentDate.getFullYear()}/>
                                        </div>
                                    </div>
                                    <TrendCharts allData={sheetData}/>
                                </>
                            )}

                            {view === 'directory' && (
                                <DirectoryView employees={employees} loading={empLoading} onAdd={openAddEmp} onEdit={openEditEmp} onDelete={deleteEmp}/>
                            )}

                            {view === 'attendance' && (
                                <AttendanceView scriptUrl={uiScriptUrl || APPS_SCRIPT_URL} token={token} leaveData={leaveData}/>
                            )}

                            {view === 'ot' && (
                                <OTView scriptUrl={uiScriptUrl || APPS_SCRIPT_URL} token={token} employees={employees}/>
                            )}

                            {view === 'penalty' && (
                                <PenaltyView scriptUrl={uiScriptUrl || APPS_SCRIPT_URL} token={token} employees={employees} departments={departments}/>
                            )}

                            {view === 'settings' && (
                                <SettingsView scriptUrl={uiScriptUrl || APPS_SCRIPT_URL} token={token} departments={departments} onDeptChange={loadDepartments}/>
                            )}

                            {!currentItem.ready && (
                                <ComingSoon label={currentItem.label} Icon={currentItem.Icon}/>
                            )}
                        </main>
                    </div>

                    <MobileNav view={view} setView={setView}/>

                    <SettingsModal isOpen={isSettingsOpen} onClose={() => setIsSettingsOpen(false)} uiScriptUrl={uiScriptUrl} setUiScriptUrl={setUiScriptUrl}/>
                    {isAddLeaveOpen && (
                        <AddLeaveModal isOpen={isAddLeaveOpen} onClose={() => setIsAddLeaveOpen(false)} initialDate={addLeaveDay}
                            employeeNames={employeeNames} employees={employees} sheetData={sheetData}
                            scriptUrl={uiScriptUrl || APPS_SCRIPT_URL} token={token} onSuccess={() => fetchData()}/>
                    )}
                    <EmployeeModal isOpen={isEmpModalOpen} onClose={() => setIsEmpModalOpen(false)} scriptUrl={uiScriptUrl || APPS_SCRIPT_URL} token={token} editing={editingEmp} onSuccess={loadEmployees} departments={departments}/>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
